    align-items: center;

    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 12px;
  }

  .bar-label { white-space: nowrap; min-width: 38px; text-align: center; }
  .bar-label.today { color: var(--accent); }

  .bar-track {
    flex: 1;
    height: 6px;
    background: #1a1a1f;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }

    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), #ff9a6c);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s;
  }

  .bar-midpoint {
    position: absolute;
    top: -8px;
    width: 1px;
    height: 22px;
    background: var(--dim);
    opacity: 0.4;
  }

  .card-gap {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

    from { opacity: 0; }
    to { opacity: 1; }
  }

  }

// ──────────────────────────────────────────────────────────────
// CATEGORY DISTANCE MATRIX
// How "far apart" two categories feel. Pairings across
// distant categories are more surprising.
// 1.0 = maximally different worlds
// 0.0 = same category
// ──────────────────────────────────────────────────────────────
const CAT_DISTANCE = {
  // same → 0
  // related → 0.2–0.4
  // unrelated → 0.6–1.0
};

function catDistance(a, b) {
  if (a === b) return 0.0;
  const key = [a, b].sort().join("|");
  const map = {
    "politics|war":      0.15,  // closely related
    "disaster|war":      0.20,
    "politics|disaster":  0.25,
    "science|tech":      0.20,
    "space|tech":        0.25,
    "science|space":     0.20,
    "culture|social":    0.25,
    "politics|social":   0.30,
    // cross-domain (the good stuff)
    "ancient|tech":      1.00,
    "ancient|culture":   0.95,
    "ancient|social":    0.95,
    "culture|war":       0.80,
    "culture|science":   0.85,

    "culture|politics":  0.70,
    "culture|disaster":  0.75,
    "culture|ancient":   0.95,
    "tech|war":          0.80,
    "tech|ancient":      1.00,
    "tech|politics":     0.60,
    "tech|disaster":     0.65,
    "social|war":        0.85,
    "social|science":    0.80,
    "social|space":      0.85,
    "social|ancient":    0.95,
    "social|disaster":   0.60,
    "social|tech":       0.40,

    "space|politics":    0.60,
    "space|disaster":    0.55,
    "space|ancient":     0.95,

  return map[key] ?? 0.5; // default for unlisted combos

// ──────────────────────────────────────────────────────────────
// DATE UTILITIES
// ──────────────────────────────────────────────────────────────

const MS_PER_DAY  = 86400000;
const MS_PER_YEAR = 365.2425 * MS_PER_DAY;

function parseDate(str) {
  const m = str.match(/^(-?\d+)-(\d{2})-(\d{2})$/);
  if (!m) return null;
  const year  = parseInt(m[1], 10);
  const month = parseInt(m[2], 10) - 1;
  const day   = parseInt(m[3], 10);
  if (year >= 0) {
    const d = new Date(Date.UTC(year, month, day));
    d.setUTCFullYear(year);
    return d.getTime();
  }
  const monthDays = [0,31,59,90,120,151,181,212,243,273,304,334];
  return year * MS_PER_YEAR + (monthDays[month] + day - 1) * MS_PER_DAY;
}

function daysBetween(a, b) { return Math.abs(b - a) / MS_PER_DAY; }

function fmtDuration(days) {
  const y = Math.floor(days / 365.2425);
  const rem = Math.round(days - y * 365.2425);
  if (y > 0 && rem > 30) {
    return `${y.toLocaleString()} yr${y !== 1 ? 's' : ''}, ${Math.round(rem / 30.44)} mo`;
  }
  if (y > 0) return `${y.toLocaleString()} yr${y !== 1 ? 's' : ''}`;
  return `${Math.round(days)} days`;
}

function fmtDate(str) {
  const m = str.match(/^(-?\d+)-(\d{2})-(\d{2})$/);
  const year  = parseInt(m[1], 10);
  const month = parseInt(m[2], 10);
  const day   = parseInt(m[3], 10);
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (year < 0) return `${Math.abs(year)} BC`;
  if (year < 1000) return `${names[month-1]} ${day}, ${year} AD`;
  return `${names[month-1]} ${day}, ${year}`;
}

function fmtBarLabel(str) {
  const y = parseInt(str.match(/^(-?\d+)/)[1], 10);
  return y < 0 ? `${Math.abs(y)} BC` : `${y}`;
}


// ──────────────────────────────────────────────────────────────
// SURPRISE SCORING + GENERATION
//
// THE BRIMLEY LINE
//
// The sweet spot for surprise is when the "recent" event sits
// at or just below the MIDPOINT between the older event and
// today — the 44–50% zone. This is the moment where your gut
// says "no way" and the math says "yes way."
//
//   position = daysToPast / (daysToPast + daysToToday)
//
//   0.00 = the recent event IS the older event (boring)
//   0.25 = obviously close to the past event (boring)
//   0.47 = BRIMLEY LINE — just barely tipped over (!!!)
//   0.50 = exact midpoint (still great)
//
// A Gaussian curve centered on 0.47 creates the scoring:
// events right at the Brimley Line score highest, events
// far from it (0.10, 0.30) score near zero.
//
// On top of that: salience gate, vibe gap bonus, category
// distance bonus. But position is KING.
// ──────────────────────────────────────────────────────────────

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const today     = Date.now();
const NUM_CARDS = 8;

// Minimum gap between the two events: ~4 years in days.
const MIN_GAP_DAYS = 4 * 365;

// Minimum salience for BOTH events.
const MIN_SALIENCE = 0.25;

// Brimley Line: ideal position of the recent event between
// the older event and today. 0.47 = just barely past midpoint.
const BRIMLEY_CENTER = 0.47;
const BRIMLEY_SIGMA  = 0.08; // how tight the sweet spot is

function brimleyScore(position) {
  // Gaussian centered on BRIMLEY_CENTER
  const delta = position - BRIMLEY_CENTER;
  return Math.exp(-(delta * delta) / (2 * BRIMLEY_SIGMA * BRIMLEY_SIGMA));
}

function scorePair(recent, older, daysToToday, daysToPast) {
  // ── GATE: both events must be well-known ──
  const minSalience = Math.min(recent.salience, older.salience);
  if (minSalience < MIN_SALIENCE) return -1;

  // ── CORE: Brimley Line position ──
  // Where does the recent event sit between older and today?
  const position = daysToPast / (daysToPast + daysToToday);
  const brimley  = brimleyScore(position);

  // ── BONUS: vibe gap (one feels recent, one feels ancient) ──
  const vibeGap = Math.max(0, recent.vibe - older.vibe);

  // ── BONUS: cross-domain surprise ──
  const catDist = catDistance(recent.cat, older.cat);

  // ── MULTIPLIER: average salience ──
  const avgSalience = (recent.salience + older.salience) / 2;

  // Brimley score is king (0–1), boosted by salience,
  // with vibe gap and category as tiebreakers.
  return (brimley * 5 * avgSalience)
       + (vibeGap * 1.5)
       + (catDist * 1.0);
}

function generate() {
  // 1. Build ALL valid pairs and score them
  const allPairs = [];

  for (const recent of events) {
    const recentMs    = parseDate(recent.date);
    const daysToToday = daysBetween(recentMs, today);

    for (const older of events) {
      const olderMs = parseDate(older.date);
      if (olderMs >= recentMs) continue;
      const daysToPast = daysBetween(olderMs, recentMs);
      if (daysToPast >= daysToToday) continue;     // not actually closer
      if (daysToPast < MIN_GAP_DAYS) continue;     // trivially close

      const score = scorePair(recent, older, daysToToday, daysToPast);
      if (score < 0) continue;                     // failed salience gate

      allPairs.push({ recent, older, daysToToday, daysToPast, score });
    }
  }

  // 2. Sort by score descending
  allPairs.sort((a, b) => b.score - a.score);

  // 3. Pick ONE random card from the top pool
  const pool = allPairs.slice(0, Math.min(30, allPairs.length));
  const r = pool[Math.floor(Math.random() * pool.length)];
  if (!r) return;

  const pct = ((r.daysToPast / (r.daysToPast + r.daysToToday)) * 100).toFixed(1);
  const el = document.getElementById("card");
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  const verb = r.recent.plural ? "are" : "is";
  el.innerHTML = `
    <div class="card">
      <div class="card-main">
        <span class="event-name">${cap(r.recent.name)}</span>
        <span class="closer-to"> ${verb} now closer to </span>
        <span class="past-event">${r.older.name}</span>
        <span class="closer-to"> than to today.</span>
      </div>
      <div class="card-dates">
        ${fmtDate(r.older.date)} &#8594; <strong style="color:var(--fg)">${fmtDate(r.recent.date)}</strong> &#8594; Today
      </div>
      <div class="bar-container">
        <span class="bar-label">${fmtBarLabel(r.older.date)}</span>
        <div class="bar-track">
          <div class="bar-fill" data-pct="${pct}"></div>
          <div class="bar-midpoint" style="left:50%"></div>
        </div>
        <span class="bar-label today">Now</span>
      </div>
      <div class="card-gap">
        <span>${fmtDuration(r.daysToPast)} to past event</span>
        <span>${fmtDuration(r.daysToToday)} to today</span>
      </div>
    </div>
  `;

  // Animate bar after a beat
  requestAnimationFrame(() => {
    const fill = el.querySelector(".bar-fill");
    if (fill) {
      fill.style.width = fill.dataset.pct + "%";
      fill.classList.add("animate");
    }
  });
}

generate();
</script>
