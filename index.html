<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Day Closer to the End</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0c;
    --fg: #e8e4dc;
    --dim: #6b6660;
    --accent: #ff6b35;
    --card-bg: #111114;
    --card-border: #1e1e22;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  .container {
    max-width: 680px;
    width: 100%;
    padding: 40px;
    text-align: center;
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--dim);
    margin-bottom: 60px;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.1s both;
  }

  .card {
    opacity: 0;
    animation: fadeUp 0.7s ease both;
  }

  .card-main {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 400;
    line-height: 1.35;
    margin-bottom: 40px;
    text-align: center;
  }

  .card-main .event-name { color: var(--fg); }
  .card-main .closer-to { color: var(--dim); }
  .card-main .past-event { color: var(--accent); }

  .card-dates {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.04em;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .bar-container {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 12px;
  }

  .bar-label { white-space: nowrap; min-width: 38px; text-align: center; }
  .bar-label.today { color: var(--accent); }

  .bar-track {
    flex: 1;
    height: 6px;
    background: #1a1a1f;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), #ff9a6c);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s;
  }

  .bar-fill.animate { transform: scaleX(1); }

  .bar-midpoint {
    position: absolute;
    top: -8px;
    width: 1px;
    height: 22px;
    background: var(--dim);
    opacity: 0.4;
  }

  .card-gap {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

  .card-gap span:last-child { color: var(--accent); opacity: 0.7; }

  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 50px;
    opacity: 0;
    animation: fadeIn 0.5s ease 1s both;
  }

  .another-btn, .share-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .another-btn:hover, .share-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .share-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── Share Modal ── */
  .share-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .share-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .share-modal {
    background: #131316;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 28px 32px;
    max-width: 400px;
    width: calc(100% - 48px);
    transform: translateY(16px) scale(0.97);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .share-overlay.open .share-modal {
    transform: translateY(0) scale(1);
  }

  .share-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .share-modal-title {
    font-family: 'Instrument Serif', serif;
    font-size: 1.2rem;
    color: var(--fg);
  }

  .share-close-btn {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
    line-height: 0;
  }

  .share-close-btn:hover { color: var(--fg); }

  .share-close-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
  }

  .share-preview {
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
    border: 1px solid var(--card-border);
  }

  .share-preview img {
    width: 100%;
    display: block;
  }

  .share-preview-loading {
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .share-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .share-action-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.04em;
    color: var(--fg);
    background: #1a1a1f;
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: left;
  }

  .share-action-btn:hover {
    border-color: var(--card-border);
    background: #1f1f24;
  }

  .share-action-btn .share-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .share-action-btn .share-icon svg {
    width: 18px;
    height: 18px;
  }

  .share-action-btn .share-label {
    flex: 1;
  }

  .share-action-btn .share-hint {
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 0.02em;
  }

  .share-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--fg);
    background: #1a1a1f;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
  }

  .share-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @media (max-width: 600px) {
    .container { padding: 24px; }
    .share-modal { padding: 20px 24px; }
  }
</style>
</head>
<body>
<div class="grain"></div>

<div class="container">
  <h1>One day closer to the end.</h1>
  <div id="card"></div>
  <div class="btn-row">
    <button class="another-btn" onclick="generate()">Another</button>

      Share

  </div>
</div>

        <span class="share-hint">saves image</span>
      </button>
      <button class="share-action-btn" onclick="copyImage()">

      </button>

      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="share-toast" id="shareToast"></div>

// ──────────────────────────────────────────────────────────────
// CATEGORY DISTANCE
// ──────────────────────────────────────────────────────────────
function catDistance(a, b) {
  if (a === b) return 0.0;
  const key = [a, b].sort().join("|");
  const map = {
    "politics|war":0.15,"disaster|war":0.20,"politics|disaster":0.25,
    "science|tech":0.20,"space|tech":0.25,"science|space":0.20,
    "culture|social":0.25,"politics|social":0.30,
    "ancient|tech":1.00,"ancient|culture":0.95,"ancient|social":0.95,
    "culture|war":0.80,"culture|science":0.85,"culture|space":0.85,
    "culture|politics":0.70,"culture|disaster":0.75,"culture|ancient":0.95,
    "tech|war":0.80,"tech|ancient":1.00,"tech|politics":0.60,"tech|disaster":0.65,
    "social|war":0.85,"social|science":0.80,"social|space":0.85,
    "social|ancient":0.95,"social|disaster":0.60,"social|tech":0.40,
    "space|war":0.70,"space|politics":0.60,"space|disaster":0.55,
    "space|ancient":0.95,"space|culture":0.85,
    "science|war":0.75,"science|politics":0.65,"science|disaster":0.60,
    "science|ancient":0.90,"science|culture":0.85,
    "disaster|ancient":0.70,
    "landmark|culture":0.60,"landmark|tech":0.70,"landmark|war":0.50,
    "landmark|politics":0.45,"landmark|science":0.65,"landmark|space":0.70,
    "landmark|disaster":0.55,"landmark|ancient":0.40,"landmark|social":0.65,
  };
  return map[key] ?? 0.5;
}

// ──────────────────────────────────────────────────────────────
// DATE UTILITIES
// ──────────────────────────────────────────────────────────────
const MS_PER_DAY  = 86400000;
const MS_PER_YEAR = 365.2425 * MS_PER_DAY;

function parseDate(str) {
  const m = str.match(/^(-?\d+)-(\d{2})-(\d{2})$/);
  if (!m) return null;
  const year  = parseInt(m[1], 10);
  const month = parseInt(m[2], 10) - 1;
  const day   = parseInt(m[3], 10);
  if (year >= 0) {
    const d = new Date(Date.UTC(year, month, day));
    d.setUTCFullYear(year);
    return d.getTime();
  }
  const monthDays = [0,31,59,90,120,151,181,212,243,273,304,334];
  return year * MS_PER_YEAR + (monthDays[month] + day - 1) * MS_PER_DAY;
}

function daysBetween(a, b) { return Math.abs(b - a) / MS_PER_DAY; }

function fmtDuration(days) {
  const y = Math.floor(days / 365.2425);
  const rem = Math.round(days - y * 365.2425);
  if (y > 0 && rem > 30) {
    return `${y.toLocaleString()} yr${y !== 1 ? 's' : ''}, ${Math.round(rem / 30.44)} mo`;
  }
  if (y > 0) return `${y.toLocaleString()} yr${y !== 1 ? 's' : ''}`;
  return `${Math.round(days)} days`;
}

function fmtDate(str) {
  const m = str.match(/^(-?\d+)-(\d{2})-(\d{2})$/);
  const year  = parseInt(m[1], 10);
  const month = parseInt(m[2], 10);
  const day   = parseInt(m[3], 10);
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (year < 0) return `${Math.abs(year)} BC`;
  if (year < 1000) return `${names[month-1]} ${day}, ${year} AD`;
  return `${names[month-1]} ${day}, ${year}`;
}

function fmtBarLabel(str) {
  const y = parseInt(str.match(/^(-?\d+)/)[1], 10);
  return y < 0 ? `${Math.abs(y)} BC` : `${y}`;
}

// ──────────────────────────────────────────────────────────────
// SURPRISE SCORING + GENERATION
// ──────────────────────────────────────────────────────────────
const today     = Date.now();
const MIN_GAP_DAYS = 4 * 365;
const MIN_SALIENCE = 0.25;
const BRIMLEY_CENTER = 0.47;
const BRIMLEY_SIGMA  = 0.08;

function brimleyScore(position) {
  const delta = position - BRIMLEY_CENTER;
  return Math.exp(-(delta * delta) / (2 * BRIMLEY_SIGMA * BRIMLEY_SIGMA));
}

function scorePair(recent, older, daysToToday, daysToPast) {
  const minSalience = Math.min(recent.salience, older.salience);
  if (minSalience < MIN_SALIENCE) return -1;
  const position = daysToPast / (daysToPast + daysToToday);
  const brimley  = brimleyScore(position);
  const vibeGap = Math.max(0, recent.vibe - older.vibe);
  const catDist = catDistance(recent.cat, older.cat);
  const avgSalience = (recent.salience + older.salience) / 2;
  return (brimley * 5 * avgSalience) + (vibeGap * 1.5) + (catDist * 1.0);
}

// Store current card data for sharing text
let currentCard = null;

function generate() {
  const allPairs = [];
  for (const recent of events) {
    const recentMs    = parseDate(recent.date);
    const daysToToday = daysBetween(recentMs, today);
    for (const older of events) {
      const olderMs = parseDate(older.date);
      if (olderMs >= recentMs) continue;
      const daysToPast = daysBetween(olderMs, recentMs);
      if (daysToPast >= daysToToday) continue;
      if (daysToPast < MIN_GAP_DAYS) continue;
      const score = scorePair(recent, older, daysToToday, daysToPast);
      if (score < 0) continue;
      allPairs.push({ recent, older, daysToToday, daysToPast, score });
    }
  }
  allPairs.sort((a, b) => b.score - a.score);
  const pool = allPairs.slice(0, Math.min(30, allPairs.length));
  const r = pool[Math.floor(Math.random() * pool.length)];
  if (!r) return;

  currentCard = r;

  const pct = ((r.daysToPast / (r.daysToPast + r.daysToToday)) * 100).toFixed(1);
  const el = document.getElementById("card");
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  const verb = r.recent.plural ? "are" : "is";
  el.innerHTML = `
    <div class="card">
      <div class="card-main">
        <span class="event-name">${cap(r.recent.name)}</span>
        <span class="closer-to"> ${verb} now closer to </span>
        <span class="past-event">${r.older.name}</span>
        <span class="closer-to"> than to today.</span>
      </div>
      <div class="card-dates">
        ${fmtDate(r.older.date)} &#8594; <strong style="color:var(--fg)">${fmtDate(r.recent.date)}</strong> &#8594; Today
      </div>
      <div class="bar-container">
        <span class="bar-label">${fmtBarLabel(r.older.date)}</span>
        <div class="bar-track">
          <div class="bar-fill" data-pct="${pct}"></div>
          <div class="bar-midpoint" style="left:50%"></div>
        </div>
        <span class="bar-label today">Now</span>
      </div>
      <div class="card-gap">
        <span>${fmtDuration(r.daysToPast)} to past event</span>
        <span>${fmtDuration(r.daysToToday)} to today</span>
      </div>
    </div>
  `;

  requestAnimationFrame(() => {
    const fill = el.querySelector(".bar-fill");
    if (fill) {
      fill.style.width = fill.dataset.pct + "%";
      fill.classList.add("animate");
    }
  });
}

// ──────────────────────────────────────────────────────────────
// SHARE FUNCTIONALITY
// ──────────────────────────────────────────────────────────────

let capturedBlob = null;
let capturedDataUrl = null;

function getShareText() {
  if (!currentCard) return "One day closer to the end.";
  const r = currentCard;
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  const verb = r.recent.plural ? "are" : "is";
  return `${cap(r.recent.name)} ${verb} now closer to ${r.older.name} than to today.`;
}

async function captureCard() {
  const cardEl = document.getElementById("card");
  if (!cardEl || !cardEl.querySelector(".card")) return null;

  // Create an offscreen wrapper with padding and background for a nice screenshot
  const wrapper = document.createElement("div");
  wrapper.style.cssText = `
    position: fixed; left: -9999px; top: 0;
    width: 640px; padding: 48px 48px 40px;
    background: #0a0a0c;
    font-family: 'DM Mono', monospace;
    color: #e8e4dc;
  `;

  // Title
  const title = document.createElement("div");
  title.style.cssText = `
    font-family: 'Instrument Serif', serif;
    font-size: 1.1rem; font-weight: 400;
    color: #6b6660; text-align: center;
    margin-bottom: 36px;
  `;
  title.textContent = "One day closer to the end.";
  wrapper.appendChild(title);

  // Clone the card content
  const clone = cardEl.cloneNode(true);
  // Make sure the bar fill is visually rendered in the clone
  const cloneFill = clone.querySelector(".bar-fill");
  if (cloneFill) {
    cloneFill.style.transform = `scaleX(1)`;
    cloneFill.style.width = cloneFill.dataset.pct + "%";
    cloneFill.style.transition = "none";
  }
  // Force card visible
  const cloneCard = clone.querySelector(".card");
  if (cloneCard) {
    cloneCard.style.opacity = "1";
    cloneCard.style.animation = "none";
  }
  wrapper.appendChild(clone);

  document.body.appendChild(wrapper);

  try {
    const canvas = await html2canvas(wrapper, {
      backgroundColor: "#0a0a0c",
      scale: 2,
      useCORS: true,
      logging: false,
    });

    capturedDataUrl = canvas.toDataURL("image/png");
    capturedBlob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));

    return capturedDataUrl;
  } catch (err) {
    console.error("Capture failed:", err);
    return null;
  } finally {
    document.body.removeChild(wrapper);
  }
}

async function openShare() {
  const overlay = document.getElementById("shareOverlay");
  const preview = document.getElementById("sharePreview");

  // Show modal immediately with loading state
  preview.innerHTML = `<div class="share-preview-loading">Capturing...</div>`;
  overlay.classList.add("open");

  // Capture the card
  const dataUrl = await captureCard();
  if (dataUrl) {
    preview.innerHTML = `<img src="${dataUrl}" alt="Card preview">`;
  } else {
    preview.innerHTML = `<div class="share-preview-loading">Capture failed — try again</div>`;
  }
}

function closeShare() {
  document.getElementById("shareOverlay").classList.remove("open");
}

function closeShareOutside(e) {
  if (e.target === e.currentTarget) closeShare();
}

function showToast(msg) {
  const toast = document.getElementById("shareToast");
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove("show"), 2200);
}

function shareToBluesky() {
  const text = getShareText();
  const url = `https://bsky.app/intent/compose?text=${encodeURIComponent(text)}`;
  window.open(url, "_blank");
  showToast("Opened Bluesky — paste the image from clipboard or downloads");
  // Also try to copy image
  tryCopyImage();
}

function shareToLinkedIn() {
  const text = getShareText();
  const url = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent("data:text/plain," + text)}`;
  // LinkedIn's share URL is limited — open the feed compose instead
  window.open(`https://www.linkedin.com/feed/?shareActive=true`, "_blank");
  showToast("Opened LinkedIn — paste the image and text");
  // Copy both text and image
  tryCopyImage();
}

function shareToInstagram() {
  // Instagram requires native app — best we can do is download
  downloadImage();
  showToast("Image saved — open Instagram and share from your gallery");
}

async function tryCopyImage() {
  if (!capturedBlob) return;
  try {
    await navigator.clipboard.write([
      new ClipboardItem({ "image/png": capturedBlob })
    ]);
  } catch (e) {
    // Clipboard write not supported — that's okay
  }
}

async function copyImage() {
  if (!capturedBlob) {
    showToast("No image captured yet");
    return;
  }
  try {
    await navigator.clipboard.write([
      new ClipboardItem({ "image/png": capturedBlob })
    ]);
    showToast("Image copied to clipboard");
  } catch (e) {
    // Fallback: copy the share text
    try {
      await navigator.clipboard.writeText(getShareText());
      showToast("Text copied — image copy not supported in this browser");
    } catch (e2) {
      showToast("Copy not available — try saving instead");
    }
  }
}

function downloadImage() {
  if (!capturedDataUrl) {
    showToast("No image captured yet");
    return;
  }
  const a = document.createElement("a");
  a.href = capturedDataUrl;
  a.download = "one-day-closer.png";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast("Image saved");
}

// ── Keyboard: Escape to close modal ──
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeShare();
});

generate();
