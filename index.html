<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Another Day Closer to the End</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0c;
    --fg: #e8e4dc;
    --dim: #6b6660;
    --accent: #ff6b35;
    --card-bg: #111114;
    --card-border: #1e1e22;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  .container {
    max-width: 680px;
    width: 100%;
    padding: 40px;
    text-align: center;
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--dim);
    margin-bottom: 60px;
    opacity: 0;
    animation: fadeIn 0.6s ease 0.1s both;
  }

  .card {
    opacity: 0;
    animation: fadeUp 0.7s ease both;
  }

  .card-main {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 400;
    line-height: 1.35;
    margin-bottom: 40px;
    text-align: center;
  }

  .card-main .event-name { color: var(--fg); }
  .card-main .closer-to { color: var(--dim); }
  .card-main .past-event { color: var(--accent); }

  .card-dates {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.04em;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .bar-container {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 12px;
  }

  .bar-label { white-space: nowrap; min-width: 38px; text-align: center; }
  .bar-label.today { color: var(--accent); }

  .bar-track {
    flex: 1;
    height: 6px;
    background: #1a1a1f;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), #ff9a6c);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s;
  }

  .bar-fill.animate { transform: scaleX(1); }

  .bar-midpoint {
    position: absolute;
    top: -8px;
    width: 1px;
    height: 22px;
    background: var(--dim);
    opacity: 0.4;
  }

  .card-gap {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

  .card-gap span:last-child { color: var(--accent); opacity: 0.7; }

  /* ── Action rows ── */
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 50px;
    opacity: 0;
    animation: fadeIn 0.5s ease 1s both;
  }

  .another-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .another-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .birthday-btn { display: none; }
  .birthday-btn.visible { display: inline-flex; }

  /* ── Birthday input ── */
  .birthday-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.05s both;
  }

  .birthday-label {
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
    opacity: 0.6;
  }

  .birthday-input {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.04em;
    color: var(--fg);
    background: transparent;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 7px 12px;
    outline: none;
    transition: border-color 0.2s, color 0.2s;
    color-scheme: dark;
  }

  .birthday-input:hover { border-color: #333; }
  .birthday-input:focus { border-color: var(--accent); }

  .birthday-clear {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    background: transparent;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 6px 10px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    display: none;
  }

  .birthday-clear:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .birthday-clear.visible { display: inline-flex; }

  /* ── Copy image buttons ── */
  .copy-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 16px;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.1s both;
  }

  .copy-row-label {
    width: 100%;
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 4px;
    opacity: 0.6;
  }

  .copy-btn {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.04em;
    color: var(--dim);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    transition: color 0.25s, border-color 0.25s, background 0.25s;
    position: relative;
    min-width: 80px;
  }

  .copy-btn:hover {
    color: var(--fg);
    border-color: #333;
    background: #111114;
  }

  .copy-btn:active {
    transform: scale(0.97);
  }

  .copy-btn .platform-name {
    font-size: 0.65rem;
    letter-spacing: 0.02em;
  }

  .copy-btn .platform-size {
    font-size: 0.5rem;
    opacity: 0.5;
  }

  .copy-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .copy-btn:hover svg { opacity: 0.8; }

  .copy-btn.copied {
    color: var(--accent);
    border-color: var(--accent);
  }

  .copy-btn.copied svg {
    opacity: 1;
    stroke: var(--accent);
  }

  /* ── Share text buttons ── */
  .share-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 14px;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.2s both;
  }

  .share-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.04em;
    color: var(--dim);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    transition: color 0.25s, border-color 0.25s, background 0.25s;
  }

  .share-btn:hover {
    color: var(--fg);
    border-color: #333;
    background: #111114;
  }

  .share-btn:active { transform: scale(0.97); }

  .share-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .share-btn:hover svg { opacity: 1; }

  /* ── Toast ── */
  .share-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--fg);
    background: #1a1a1f;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
  }

  .share-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .credit {
    margin-top: 28px;
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.4s both;
  }

  .credit a {
    color: var(--dim);
    text-decoration: none;
    border-bottom: 1px solid #2a2a2e;
    transition: color 0.2s, border-color 0.2s;
  }

  .credit a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @media (max-width: 600px) {
    .container { padding: 24px; }
    .copy-btn { min-width: 70px; padding: 7px 10px; }
  }
</style>
</head>
<body>
<div class="grain"></div>

<div class="container">
  <h1>Another day closer to the end.</h1>
  <div id="card"></div>
  <div class="btn-row">
    <button class="another-btn" onclick="generate()">Another</button>
    <button class="another-btn birthday-btn" id="birthdayBtn" onclick="generateBirthday()">Your birthday</button>
  </div>
  <div class="birthday-row">
    <label class="birthday-label" for="birthdayInput">Set your birthday</label>
    <input type="date" id="birthdayInput" class="birthday-input" min="1930-01-01" max="2010-12-31">
    <button class="birthday-clear" id="birthdayClear" onclick="clearBirthday()" title="Clear birthday">✕</button>
  </div>
  <div class="copy-row">
    <div class="copy-row-label">Copy image for</div>

    <button class="copy-btn" onclick="copyForPlatform(this, 1200, 627, 'LinkedIn')" title="1200 × 627">

    <button class="copy-btn" onclick="copyForPlatform(this, 1200, 630, 'Bluesky')" title="1200 × 630">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      <span class="platform-name">Bluesky</span>
      <span class="platform-size">1200 × 630</span>
    </button>
  </div>
  <div class="share-row">
    <div class="copy-row-label">Share text to</div>
    <button class="share-btn" onclick="shareToX()">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      <span class="platform-name">X</span>
    </button>
    <button class="share-btn" onclick="shareToBluesky()">
      <svg viewBox="0 0 600 530" fill="currentColor" stroke="none"><path d="M135.72 44.03C202.216 93.951 273.74 195.17 300 249.49c26.262-54.316 97.782-155.54 164.28-205.46C512.26 8.009 590-19.862 590 68.825c0 17.712-10.155 148.79-16.111 170.07-20.703 73.984-96.144 92.854-163.25 81.433 117.3 19.964 147.14 86.092 82.697 152.22-122.39 125.59-175.91-31.511-189.63-71.766-2.514-7.38-3.69-10.832-3.708-7.896-.017-2.935-1.193.516-3.707 7.896-13.714 40.255-67.233 197.36-189.63 71.766-64.444-66.128-34.605-132.256 82.697-152.22-67.108 11.421-142.55-7.449-163.25-81.433C20.15 217.613 10 86.536 10 68.824c0-88.687 77.742-60.816 125.72-24.795z"/></svg>
      <span class="platform-name">Bluesky</span>
    </button>
    <button class="share-btn" onclick="shareToLinkedIn()">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      <span class="platform-name">LinkedIn</span>
    </button>
  </div>
  <div class="credit">
    by <a href="https://www.paulmusgrave.info" target="_blank">Paul Musgrave</a> · <a href="https://bsky.app/profile/professormusgrave.bsky.social" target="_blank">@professormusgrave.bsky.social</a>
  </div>
</div>

<!-- Toast -->
<div class="share-toast" id="shareToast"></div>

// ──────────────────────────────────────────────────────────────
// DATE UTILITIES
// ──────────────────────────────────────────────────────────────
const MS_PER_DAY  = 86400000;
const MS_PER_YEAR = 365.2425 * MS_PER_DAY;

function parseDate(str) {
  const m = str.match(/^(-?\d+)-(\d{2})-(\d{2})$/);
  if (!m) return null;
  const year  = parseInt(m[1], 10);
  const month = parseInt(m[2], 10) - 1;
  const day   = parseInt(m[3], 10);
  if (year >= 0) {
    const d = new Date(Date.UTC(year, month, day));
    d.setUTCFullYear(year);
    return d.getTime();
  }
  const monthDays = [0,31,59,90,120,151,181,212,243,273,304,334];
  return year * MS_PER_YEAR + (monthDays[month] + day - 1) * MS_PER_DAY;
}

function daysBetween(a, b) { return Math.abs(b - a) / MS_PER_DAY; }

function fmtDuration(days) {
  const y = Math.floor(days / 365.2425);
  const rem = Math.round(days - y * 365.2425);
  if (y > 0 && rem > 30) {
    return `${y.toLocaleString()} yr${y !== 1 ? 's' : ''}, ${Math.round(rem / 30.44)} mo`;
  }
  if (y > 0) return `${y.toLocaleString()} yr${y !== 1 ? 's' : ''}`;
  return `${Math.round(days)} days`;
}

function fmtDate(str) {
  const m = str.match(/^(-?\d+)-(\d{2})-(\d{2})$/);
  const year  = parseInt(m[1], 10);
  const month = parseInt(m[2], 10);
  const day   = parseInt(m[3], 10);
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (year < 0) return `${Math.abs(year)} BC`;
  if (year < 1000) return `${names[month-1]} ${day}, ${year} AD`;
  return `${names[month-1]} ${day}, ${year}`;
}

function fmtBarLabel(str) {
  const y = parseInt(str.match(/^(-?\d+)/)[1], 10);
  return y < 0 ? `${Math.abs(y)} BC` : `${y}`;
}

// ──────────────────────────────────────────────────────────────
// SURPRISE SCORING + GENERATION
// ──────────────────────────────────────────────────────────────
const today     = Date.now();
const MIN_GAP_DAYS = 4 * 365;
const MIN_POSITION = 0.35;
const BRIMLEY_CENTER = 0.47;
const BRIMLEY_SIGMA  = 0.08;

function brimleyScore(position) {
  const delta = position - BRIMLEY_CENTER;
  return Math.exp(-(delta * delta) / (2 * BRIMLEY_SIGMA * BRIMLEY_SIGMA));
}

const GRAVITY_WEIGHT = 0.15;

function scorePair(recent, older, daysToToday, daysToPast) {
  const position = daysToPast / (daysToPast + daysToToday);
  const brimley = brimleyScore(position);
  const gravityBonus = Math.max(0, (older.gravity || 0) - (recent.gravity || 0));
  return brimley + GRAVITY_WEIGHT * gravityBonus;
}

const recentHistory = [];
const HISTORY_SIZE = 15;
let currentCard = null;
let birthdayEvent = null;

function renderCard(r) {
  currentCard = r;

  const pct = ((r.daysToPast / (r.daysToPast + r.daysToToday)) * 100).toFixed(1);
  const el = document.getElementById("card");
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  const verb = r.recent.plural ? "are" : "is";
  el.innerHTML = `
    <div class="card">
      <div class="card-main">
        <span class="event-name">${cap(r.recent.name)}</span>
        <span class="closer-to"> ${verb} now closer to </span>
        <span class="past-event">${r.older.name}</span>
        <span class="closer-to"> than to today.</span>
      </div>
      <div class="card-dates">
        <span style="color:var(--accent)">${fmtDate(r.older.date)}</span> &#8594; <strong style="color:var(--fg)">${fmtDate(r.recent.date)}</strong> &#8594; Today
      </div>
      <div class="bar-container">
        <span class="bar-label">${fmtBarLabel(r.older.date)}</span>
        <div class="bar-track">
          <div class="bar-fill" data-pct="${pct}"></div>
          <div class="bar-midpoint" style="left:50%"></div>
        </div>
        <span class="bar-label today">Now</span>
      </div>
      <div class="card-gap">
        <span>${fmtDuration(r.daysToPast)} to past event</span>
        <span>${fmtDuration(r.daysToToday)} to today</span>
      </div>
    </div>
  `;

  document.querySelectorAll('.copy-btn').forEach(b => b.classList.remove('copied'));

  requestAnimationFrame(() => {
    const fill = el.querySelector(".bar-fill");
    if (fill) {
      fill.style.width = fill.dataset.pct + "%";
      fill.classList.add("animate");
    }
  });
}

function generate() {
  const allPairs = [];
  for (const recent of events) {
    const recentMs    = parseDate(recent.date);
    const daysToToday = daysBetween(recentMs, today);
    for (const older of events) {
      const olderMs = parseDate(older.date);
      if (olderMs >= recentMs) continue;
      const daysToPast = daysBetween(olderMs, recentMs);
      if (daysToPast >= daysToToday) continue;
      if (daysToPast < MIN_GAP_DAYS) continue;
      const position = daysToPast / (daysToPast + daysToToday);
      if (position < MIN_POSITION) continue;
      const score = scorePair(recent, older, daysToToday, daysToPast);
      allPairs.push({ recent, older, daysToToday, daysToPast, score });
    }
  }
  allPairs.sort((a, b) => b.score - a.score);
  const pool = allPairs.slice(0, Math.min(50, allPairs.length));

  const pairKey = p => p.recent.name + '|' + p.older.name;
  let available = pool.filter(p => !recentHistory.includes(pairKey(p)));
  if (available.length === 0) available = pool;

  const r = available[Math.floor(Math.random() * available.length)];
  if (!r) return;

  recentHistory.push(pairKey(r));
  if (recentHistory.length > HISTORY_SIZE) recentHistory.shift();

  renderCard(r);
}

// ──────────────────────────────────────────────────────────────
// CANVAS CAPTURE (adaptive dimensions)
// ──────────────────────────────────────────────────────────────

async function captureCard(W, H) {
  await document.fonts.ready;
  if (!currentCard) return null;
  const r = currentCard;

  const canvas = document.createElement("canvas");
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext("2d");

  // ── Colors ──
  const BG      = "#0a0a0c";
  const FG      = "#e8e4dc";
  const DIM     = "#6b6660";
  const ACCENT  = "#ff6b35";
  const ACCENT2 = "#ff9a6c";
  const TRACK   = "#1a1a1f";
  const WMARK   = "#3a3630";

  // ── Fonts ──
  const SERIF = "'Instrument Serif', serif";
  const MONO  = "'DM Mono', monospace";

  // ── Aspect-aware scaling ──
  const aspect = W / H;
  const isSquare = aspect < 1.2;
  const isWide   = aspect > 1.5;

  const S = W / 1200;
  const textBoost = isSquare ? 1.25 : isWide ? 1.0 : 1.1;

  // ── Background ──
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // ── Helpers ──
  function drawSegments(segments, x, y, font, align) {
    ctx.font = font;
    let totalW = 0;
    for (const s of segments) { totalW += ctx.measureText(s.text).width; }
    let curX = align === "center" ? x - totalW / 2 : x;
    for (const s of segments) {
      ctx.fillStyle = s.color;
      ctx.fillText(s.text, curX, y);
      curX += ctx.measureText(s.text).width;
    }
  }

  const PAD = Math.round((isSquare ? 64 : 80) * S);
  const CX = W / 2;

  const titleY    = Math.round(H * (isSquare ? 0.15 : 0.14));
  const mainTop   = H * (isSquare ? 0.26 : 0.28);
  const mainZone  = H * (isSquare ? 0.36 : 0.32);
  const barZoneY  = H * (isSquare ? 0.70 : 0.68);
  const wmY       = H - Math.round((isSquare ? 48 : 32) * S);

  // ── Title ──
  const titleSize = Math.round(28 * S * textBoost);
  let y = titleY;
  ctx.font = `400 ${titleSize}px ${SERIF}`;
  ctx.fillStyle = DIM;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("Another day closer to the end.", CX, y);

  // ── Main text (multi-color, word-wrapped) ──
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  const verb = r.recent.plural ? "are" : "is";
  const mainSize = Math.round(38 * S * textBoost);
  const mainFont = `400 ${mainSize}px ${SERIF}`;
  const mainLineH = Math.round(52 * S * textBoost);
  const maxLineW = W - PAD * 2;

  const parts = [
    { text: cap(r.recent.name), color: FG },
    { text: ` ${verb} now closer to `, color: DIM },
    { text: r.older.name, color: ACCENT },
    { text: " than to today.", color: DIM },
  ];

  let charColors = [];
  for (const p of parts) {
    for (const ch of p.text) {
      charColors.push({ ch, color: p.color });
    }
  }

  ctx.font = mainFont;
  const wrappedLines = [];
  let lineChars = [];
  let lineWidth = 0;

  for (let i = 0; i < charColors.length; i++) {
    const c = charColors[i];
    const cw = ctx.measureText(c.ch).width;
    if (lineWidth + cw > maxLineW && lineChars.length > 0) {
      let breakIdx = lineChars.length - 1;
      while (breakIdx > 0 && lineChars[breakIdx].ch !== " ") breakIdx--;
      if (breakIdx > 0) {
        const kept = lineChars.slice(0, breakIdx);
        const overflow = lineChars.slice(breakIdx + 1);
        wrappedLines.push(kept);
        lineChars = [...overflow, c];
        lineWidth = lineChars.reduce((s, cc) => s + ctx.measureText(cc.ch).width, 0);
      } else {
        wrappedLines.push(lineChars);
        lineChars = [c];
        lineWidth = cw;
      }
    } else {
      lineChars.push(c);
      lineWidth += cw;
    }
  }
  if (lineChars.length) wrappedLines.push(lineChars);

  const blockH = wrappedLines.length * mainLineH;
  let startY = Math.round(mainTop + (mainZone - blockH) / 2);

  ctx.textAlign = "left";
  for (const wl of wrappedLines) {
    let lw = 0;
    for (const c of wl) lw += ctx.measureText(c.ch).width;
    let lx = CX - lw / 2;
    for (const c of wl) {
      ctx.fillStyle = c.color;
      ctx.fillText(c.ch, lx, startY);
      lx += ctx.measureText(c.ch).width;
    }
    startY += mainLineH;
  }

  // ── Date line ──
  const metaSize = Math.round(16 * S * textBoost);
  const metaFont = `300 ${metaSize}px ${MONO}`;
  y = Math.round(barZoneY - metaSize * 2.5);
  ctx.textAlign = "center";
  const dSegs = [
    { text: fmtDate(r.older.date) + "  →  ", color: ACCENT },
    { text: fmtDate(r.recent.date), color: FG },
    { text: "  →  Today", color: DIM },
  ];
  drawSegments(dSegs, CX, y, metaFont, "center");

  // ── Progress bar ──
  y = Math.round(barZoneY);
  const barInset = Math.round(60 * S);
  const barX = PAD + barInset;
  const barW = W - PAD * 2 - barInset * 2;
  const barH = Math.round((isSquare ? 12 : 10) * S);
  const barR = Math.round(barH / 2);
  const pct = r.daysToPast / (r.daysToPast + r.daysToToday);

  ctx.fillStyle = TRACK;
  ctx.beginPath();
  ctx.roundRect(barX, y - barH / 2, barW, barH, barR);
  ctx.fill();

  const grad = ctx.createLinearGradient(barX, 0, barX + barW * pct, 0);
  grad.addColorStop(0, ACCENT);
  grad.addColorStop(1, ACCENT2);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(barX, y - barH / 2, barW * pct, barH, barR);
  ctx.fill();

  const midX = barX + barW * 0.5;
  ctx.strokeStyle = DIM;
  ctx.globalAlpha = 0.4;
  ctx.lineWidth = 1;
  const tickH = Math.round(14 * S);
  ctx.beginPath();
  ctx.moveTo(midX, y - tickH);
  ctx.lineTo(midX, y + tickH);
  ctx.stroke();
  ctx.globalAlpha = 1;

  const labelSize = Math.round(14 * S * textBoost);
  ctx.font = `300 ${labelSize}px ${MONO}`;
  ctx.textAlign = "center";
  ctx.fillStyle = DIM;
  ctx.fillText(fmtBarLabel(r.older.date), PAD + Math.round(28 * S), y + Math.round(5 * S));
  ctx.fillStyle = ACCENT;
  ctx.fillText("Now", W - PAD - Math.round(28 * S), y + Math.round(5 * S));

  // ── Gap durations ──
  const gapY = y + Math.round((isSquare ? 48 : 40) * S);
  ctx.font = `300 ${labelSize}px ${MONO}`;
  ctx.textAlign = "left";
  ctx.fillStyle = DIM;
  ctx.fillText(`${fmtDuration(r.daysToPast)} to past event`, PAD + Math.round(10 * S), gapY);
  ctx.textAlign = "right";
  ctx.fillStyle = ACCENT;
  ctx.globalAlpha = 0.7;
  ctx.fillText(`${fmtDuration(r.daysToToday)} to today`, W - PAD - Math.round(10 * S), gapY);
  ctx.globalAlpha = 1;

  // ── Watermark ──
  ctx.font = `300 ${labelSize}px ${MONO}`;
  ctx.textAlign = "center";
  ctx.fillStyle = WMARK;
  ctx.fillText("profmusgrave.github.io/anotherday", CX, wmY);

  return canvas;
}

// COPY IMAGE FOR PLATFORM
// ──────────────────────────────────────────────────────────────

function showToast(msg) {
  const toast = document.getElementById("shareToast");
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove("show"), 2200);
}

async function copyForPlatform(btnEl, w, h, platformName) {
  if (!currentCard) {
    showToast("Generate a card first");
    return;
  }

  const canvas = await captureCard(w, h);
  if (!canvas) {
    showToast("Capture failed — try again");
    return;
  }

  try {
    const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    await navigator.clipboard.write([
      new ClipboardItem({ "image/png": blob })
    ]);
    document.querySelectorAll('.copy-btn').forEach(b => b.classList.remove('copied'));
    btnEl.classList.add('copied');
    showToast(`${platformName} image copied — ${w}×${h}`);
  } catch (e) {
    try {
      const dataUrl = canvas.toDataURL("image/png");
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = `one-day-closer-${w}x${h}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      showToast(`Clipboard unavailable — saved ${w}×${h} image`);
    } catch (e2) {
      showToast("Copy not available in this browser");
    }
  }
}

// ──────────────────────────────────────────────────────────────
// BIRTHDAY INPUT
// ──────────────────────────────────────────────────────────────

const birthdayInput = document.getElementById("birthdayInput");
const birthdayClearBtn = document.getElementById("birthdayClear");
const birthdayBtn = document.getElementById("birthdayBtn");

function updateBirthdayUI() {
  if (birthdayEvent) {
    birthdayClearBtn.classList.add("visible");
    birthdayBtn.classList.add("visible");
  } else {
    birthdayClearBtn.classList.remove("visible");
    birthdayBtn.classList.remove("visible");
  }
}

// Restore from localStorage if available
const savedBirthday = localStorage.getItem("userBirthday");
if (savedBirthday) {
  birthdayInput.value = savedBirthday;
  birthdayEvent = { name: "your birthday", date: savedBirthday, cat: "culture", gravity: 0.10 };
}
updateBirthdayUI();

birthdayInput.addEventListener("change", () => {
  const val = birthdayInput.value;
  if (val) {
    birthdayEvent = { name: "your birthday", date: val, cat: "culture", gravity: 0.10 };
    localStorage.setItem("userBirthday", val);
    updateBirthdayUI();
    generateBirthday();
  }
});

function clearBirthday() {
  birthdayEvent = null;
  birthdayInput.value = "";
  localStorage.removeItem("userBirthday");
  updateBirthdayUI();
  recentHistory.length = 0;
  generate();
}

function generateBirthday() {
  if (!birthdayEvent) return;
  const bdMs = parseDate(birthdayEvent.date);
  const daysToToday = daysBetween(bdMs, today);

  const candidates = [];
  for (const older of events) {
    const olderMs = parseDate(older.date);
    if (olderMs >= bdMs) continue;
    const daysToPast = daysBetween(olderMs, bdMs);
    if (daysToPast >= daysToToday) continue;
    if (daysToPast < MIN_GAP_DAYS) continue;
    const position = daysToPast / (daysToPast + daysToToday);
    if (position < MIN_POSITION) continue;
    const score = scorePair(birthdayEvent, older, daysToToday, daysToPast);
    candidates.push({ recent: birthdayEvent, older, daysToToday, daysToPast, score });
  }
  if (candidates.length === 0) return;

  candidates.sort((a, b) => b.score - a.score);
  const pool = candidates.slice(0, Math.min(20, candidates.length));

  const pairKey = p => p.recent.name + '|' + p.older.name;
  let available = pool.filter(p => !recentHistory.includes(pairKey(p)));
  if (available.length === 0) available = pool;

  const r = available[Math.floor(Math.random() * available.length)];
  if (!r) return;

  recentHistory.push(pairKey(r));
  if (recentHistory.length > HISTORY_SIZE) recentHistory.shift();

  renderCard(r);
}

generate();
